<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SolFlip — Solana Coin Flip</title>
<style>
  body{background:#060a12;display:flex;align-items:center;justify-content:center;
    min-height:100vh;margin:0;font-family:sans-serif}
  .loader{text-align:center;color:#14f195}
  .dot{display:inline-block;width:8px;height:8px;background:#14f195;border-radius:50%;margin:0 3px;
    animation:b .8s ease-in-out infinite}
  .dot:nth-child(2){animation-delay:.15s}
  .dot:nth-child(3){animation-delay:.3s}
  @keyframes b{0%,80%,100%{transform:scale(0);opacity:.3}40%{transform:scale(1);opacity:1}}
</style>
</head>
<body>
<div class="loader">
  <div style="font-size:24px;font-weight:700;letter-spacing:.1em;margin-bottom:14px;
    font-family:monospace;color:#e2eaf8">SOL<span style="color:#14f195">FLIP</span></div>
  <div><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
</div>
<script>
(function() {
  var ua = navigator.userAgent;
  var isMobileUA = /Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini|Mobile|Tablet/i.test(ua);
  var isSmallScreen = window.innerWidth <= 900;
  var isTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
  var isMobile = isMobileUA || (isSmallScreen && isTouch);

  if (isMobile) {
    window.location.replace('./mobile.html');
  } else {
    window.location.replace('./desktop.html');
  }
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>SolFlip</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Orbitron:wght@700;900&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#060a12;--panel:#0c1422;--panel2:#0f1828;--border:#172034;--border2:#1e2e48;
  --green:#00f5a0;--green2:#00c47d;--gold:#f5c542;--red:#ff4d6d;--blue:#38bdf8;
  --sgreen:#14f195;--spurple:#9945ff;--text:#e2eaf8;--text2:#7090b8;--text3:#334d6e;
  --hdr:52px;--dock:340px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;
  height:100%;overflow:hidden;overscroll-behavior:none}
body::before{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 80% 40% at 50% 0%,rgba(153,69,255,.08) 0%,transparent 60%);
  pointer-events:none;z-index:0}

@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.4)}}
@keyframes spinning{to{transform:rotate(360deg)}}
@keyframes msgIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
@keyframes dotPop{from{transform:scale(0)}to{transform:scale(1)}}
@keyframes coinSpin{0%{transform:rotateY(0) translateY(0)}30%{transform:rotateY(900deg) translateY(-40px) scale(1.08)}70%{transform:rotateY(1350deg) translateY(-12px)}100%{transform:rotateY(var(--end-rot))}}
@keyframes resultPop{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes gs{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes floatUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-100px)}}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes tabIn{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:none}}

/* ── HEADER ── */
.hdr{position:fixed;top:0;left:0;right:0;height:var(--hdr);z-index:200;
  background:rgba(6,10,18,.97);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;padding:0 14px}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none}
.logo-icon{width:28px;height:28px;border-radius:7px;
  background:linear-gradient(135deg,var(--spurple),var(--sgreen));
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 12px rgba(153,69,255,.5);flex-shrink:0}
.logo-icon svg{width:15px;height:15px}
.logo-text{font-family:'Orbitron',monospace;font-size:16px;font-weight:900;letter-spacing:.05em}
.logo-text b{color:var(--text)}.logo-text span{color:var(--sgreen)}
.hdr-r{display:flex;align-items:center;gap:7px}
.net-pill{padding:2px 8px;border-radius:20px;font-size:9px;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;font-family:'Rajdhani',sans-serif;
  background:rgba(20,241,149,.1);border:1px solid rgba(20,241,149,.25);color:var(--sgreen)}
.btn-connect{display:flex;align-items:center;gap:5px;padding:7px 14px;
  background:linear-gradient(135deg,var(--spurple),#6d28d9);border:none;border-radius:8px;
  color:#fff;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;letter-spacing:.06em;
  cursor:pointer;box-shadow:0 2px 12px rgba(153,69,255,.4);white-space:nowrap}
.btn-connect.connected{background:linear-gradient(135deg,var(--green2),#007a50)}
.btn-connect svg{width:12px;height:12px;flex-shrink:0}

/* ── SCROLL AREA (between header and dock) ── */
.scroll-area{position:fixed;top:var(--hdr);left:0;right:0;bottom:var(--dock);
  overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;z-index:1}
.scroll-area::-webkit-scrollbar{display:none}

/* ── TAB SWITCHER (inside scroll area top) ── */
.tab-bar{display:flex;background:var(--panel);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:10}
.tab-btn{flex:1;padding:11px 6px;border:none;background:transparent;
  color:var(--text3);font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .15s;
  border-bottom:2px solid transparent}
.tab-btn.active{color:var(--sgreen);border-bottom-color:var(--sgreen)}

/* ── TAB CONTENT ── */
.tab-pane{display:none;animation:tabIn .2s ease}
.tab-pane.active{display:block}

/* ── GAME TAB ── */
/* Hist bar */
.hist-bar{padding:8px 12px;display:flex;align-items:center;gap:5px;flex-wrap:wrap;
  background:var(--panel);border-bottom:1px solid var(--border)}
.hb-dot{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:8.5px;font-weight:700;font-family:'Rajdhani',sans-serif;flex-shrink:0;animation:dotPop .2s ease}
.hb-dot.H{background:rgba(245,197,66,.18);color:var(--gold);border:1px solid rgba(245,197,66,.35)}
.hb-dot.T{background:rgba(20,241,149,.12);color:var(--sgreen);border:1px solid rgba(20,241,149,.3)}
.hb-stats{margin-left:auto;display:flex;gap:8px;font-size:10.5px;color:var(--text3);
  font-family:'Rajdhani',sans-serif;font-weight:600;flex-shrink:0}

/* Coin stage */
.coin-stage{height:220px;background:linear-gradient(180deg,#090f1e 0%,#060a12 100%);
  display:flex;align-items:center;justify-content:center;
  perspective:700px;position:relative;overflow:hidden;border-bottom:1px solid var(--border)}
.coin-stage::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:160px;height:35px;border-radius:50%;
  background:radial-gradient(ellipse,rgba(153,69,255,.2) 0%,transparent 70%);pointer-events:none}
.coin-glow{position:absolute;width:180px;height:180px;border-radius:50%;
  background:radial-gradient(circle,rgba(153,69,255,.1) 0%,transparent 70%);pointer-events:none;transition:all .3s}
.coin-wrapper{transform-style:preserve-3d;user-select:none}
.coin{width:140px;height:140px;transform-style:preserve-3d;
  transition:transform 1.6s cubic-bezier(.23,1,.32,1);position:relative}
.face{position:absolute;width:100%;height:100%;border-radius:50%;backface-visibility:hidden;
  display:flex;align-items:center;justify-content:center;flex-direction:column}
.face-h{background:radial-gradient(circle at 38% 32%,#f8de78,#d49610 55%,#8a5e00 90%);
  box-shadow:inset -5px -5px 14px rgba(0,0,0,.45),inset 3px 3px 8px rgba(255,255,255,.22),
             0 0 30px rgba(212,150,10,.6),0 0 60px rgba(212,150,10,.2);border:2px solid #e0ae1a}
.face-t{background:radial-gradient(circle at 38% 32%,#22f8ab,#10a06a 55%,#065e3c 90%);
  box-shadow:inset -5px -5px 14px rgba(0,0,0,.45),inset 3px 3px 8px rgba(255,255,255,.22),
             0 0 30px rgba(16,160,106,.6),0 0 60px rgba(16,160,106,.2);
  border:2px solid #12d68a;transform:rotateY(180deg)}
.sol-bars{display:flex;flex-direction:column;gap:6px;align-items:center}
.sol-bar{height:6px;border-radius:3px;background:rgba(0,0,0,.55)}
.sol-bar:nth-child(1){width:52px;clip-path:polygon(7px 0,100% 0,calc(100% - 7px) 100%,0 100%)}
.sol-bar:nth-child(2){width:44px;clip-path:polygon(7px 0,100% 0,calc(100% - 7px) 100%,0 100%)}
.sol-bar:nth-child(3){width:52px;clip-path:polygon(7px 0,100% 0,calc(100% - 7px) 100%,0 100%)}
.coin-lbl{font-family:'Orbitron',monospace;font-size:6.5px;font-weight:700;letter-spacing:.2em;color:rgba(0,0,0,.6);margin-top:4px}
.tails-sym{font-size:40px;line-height:1}
.tails-lbl{font-family:'Orbitron',monospace;font-size:7px;font-weight:700;letter-spacing:.15em;color:rgba(0,0,0,.65);margin-top:3px}
.coin.flipping{animation:coinSpin 1.7s cubic-bezier(.4,0,.2,1) forwards}
.coin.show-t{transform:rotateY(180deg)}
.result-ov{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:rgba(6,10,18,.82);backdrop-filter:blur(8px);opacity:0;pointer-events:none;
  transition:opacity .3s;flex-direction:column;gap:5px}
.result-ov.show{opacity:1}
.result-word{font-family:'Orbitron',monospace;font-size:28px;font-weight:900;text-transform:uppercase;animation:resultPop .4s ease}
.result-word.win{color:var(--sgreen);text-shadow:0 0 24px var(--sgreen)}
.result-word.lose{color:var(--red);text-shadow:0 0 24px var(--red)}
.result-sub{font-family:'Rajdhani',sans-serif;font-size:14px;color:var(--text2);font-weight:600;text-align:center;padding:0 16px}

/* Stats row */
.m-stats{display:grid;grid-template-columns:1fr 1fr 1fr;background:var(--panel);
  border-bottom:1px solid var(--border)}
.m-stat{text-align:center;padding:10px 6px}
.m-sv{font-family:'Orbitron',monospace;font-size:16px;font-weight:700}
.m-sv.g{color:var(--sgreen)}.m-sv.r{color:var(--red)}
.m-sl{font-size:9.5px;color:var(--text3);font-family:'Rajdhani',sans-serif;letter-spacing:.1em;text-transform:uppercase;margin-top:2px}

/* History table */
.hist-wrap{padding:0 10px 12px;background:var(--panel)}
.ph{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;
  justify-content:space-between;font-family:'Rajdhani',sans-serif;font-size:10.5px;
  font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text2)}
.hist-tbl{width:100%;border-collapse:collapse;font-size:11.5px}
.hist-tbl th{color:var(--text3);font-family:'Rajdhani',sans-serif;font-size:9.5px;letter-spacing:.08em;
  text-transform:uppercase;padding:7px 6px;border-bottom:1px solid var(--border);text-align:left}
.hist-tbl td{padding:7px 6px;border-bottom:1px solid rgba(23,32,52,.5);color:var(--text2)}
.ow{color:var(--sgreen);font-weight:700}.ol{color:var(--red);font-weight:700}
.no-data{text-align:center;color:var(--text3);font-style:italic;padding:18px;font-size:12.5px}

/* ── CHAT TAB ── */
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - var(--hdr) - var(--dock) - 42px)}
.chat-msgs{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:6px;-webkit-overflow-scrolling:touch}
.chat-msgs::-webkit-scrollbar{display:none}
.chat-msg{display:flex;flex-direction:column;gap:2px;animation:msgIn .2s ease}
.msg-name{font-size:11px;font-weight:700;color:var(--sgreen);font-family:'Rajdhani',sans-serif;padding-left:2px}
.msg-text{font-size:13px;color:var(--text);background:rgba(255,255,255,.04);
  padding:8px 11px;border-radius:0 9px 9px 9px;border-left:2px solid var(--border2);line-height:1.5;word-break:break-word}
.chat-msg.sys .msg-text{color:var(--text3);font-style:italic;background:transparent;border-left-color:var(--border);font-size:12px}
.chat-msg.ge .msg-name{color:var(--gold)}
.chat-msg.ge .msg-text{border-left-color:rgba(245,197,66,.4);background:rgba(245,197,66,.04)}
.chat-foot{padding:10px 12px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0;
  background:var(--panel)}
.chat-inp{flex:1;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:10px;
  padding:10px 13px;color:var(--text);font-size:14px;font-family:'Syne',sans-serif;outline:none}
.chat-inp:focus{border-color:var(--sgreen)}
.chat-inp::placeholder{color:var(--text3)}
.btn-send{width:40px;height:40px;flex-shrink:0;background:var(--sgreen);border:none;border-radius:10px;
  cursor:pointer;color:#050a10;font-size:17px;display:flex;align-items:center;justify-content:center}

/* ── BOTTOM DOCK ── */
.dock{position:fixed;bottom:0;left:0;right:0;height:var(--dock);z-index:100;
  background:var(--bg);border-top:2px solid var(--border2);
  box-shadow:0 -10px 40px rgba(0,0,0,.6);overflow-y:auto}
.dock::-webkit-scrollbar{display:none}

/* Balance strip */
.dock-bal{display:flex;align-items:center;justify-content:space-between;
  padding:8px 14px;background:var(--panel2);border-bottom:1px solid var(--border)}
.bal-left{display:flex;align-items:baseline;gap:6px}
.bal-val{font-family:'Orbitron',monospace;font-size:18px;font-weight:700;color:var(--sgreen)}
.bal-usd{font-size:10px;color:var(--text3)}
.bal-ref{background:none;border:1px solid var(--border);padding:3px 10px;border-radius:6px;
  color:var(--text3);font-size:11px;cursor:pointer;font-family:'Rajdhani',sans-serif}

/* Bet amount */
.dock-bet{padding:8px 14px;border-bottom:1px solid var(--border)}
.dock-lbl{font-size:9.5px;color:var(--text3);font-family:'Rajdhani',sans-serif;letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px}
.bet-row{display:flex;align-items:center;background:rgba(255,255,255,.05);border:1px solid var(--border);
  border-radius:10px;overflow:hidden;margin-bottom:7px}
.bet-inp{flex:1;background:transparent;border:none;outline:none;color:var(--text);
  font-family:'Orbitron',monospace;font-size:20px;font-weight:700;padding:9px 13px}
.bet-cur{padding:0 13px;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;color:var(--sgreen)}
.qbets{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:6px}
.qb{padding:8px 2px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;
  color:var(--text2);font-size:12.5px;font-family:'Rajdhani',sans-serif;font-weight:700;
  cursor:pointer;text-align:center;-webkit-tap-highlight-color:transparent}
.qb.active,.qb:active{border-color:var(--sgreen);color:var(--sgreen);background:rgba(20,241,149,.08)}
.mults{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.mb{padding:8px 2px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;
  color:var(--text2);font-size:12.5px;font-family:'Rajdhani',sans-serif;font-weight:700;
  cursor:pointer;text-align:center;-webkit-tap-highlight-color:transparent}
.mb:active{border-color:var(--blue);color:var(--blue)}

/* Side + Flip */
.dock-action{padding:8px 14px 14px;display:grid;grid-template-columns:1fr 1fr 1.6fr;gap:8px;align-items:stretch}
.side-btn{padding:12px 8px;border-radius:12px;border:2px solid var(--border);
  background:rgba(255,255,255,.03);cursor:pointer;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:5px;transition:border-color .15s;position:relative}
.side-btn.ah{border-color:var(--gold);background:rgba(245,197,66,.08);box-shadow:0 0 14px rgba(245,197,66,.2)}
.side-btn.at{border-color:var(--sgreen);background:rgba(20,241,149,.08);box-shadow:0 0 14px rgba(20,241,149,.16)}
.side-icon{font-size:24px}
.side-name{font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text2)}
.side-btn.ah .side-name{color:var(--gold)}.side-btn.at .side-name{color:var(--sgreen)}
.side-chk{position:absolute;top:5px;right:5px;width:14px;height:14px;border-radius:50%;
  display:none;align-items:center;justify-content:center;font-size:8px}
.side-btn.ah .side-chk{display:flex;background:var(--gold);color:#000}
.side-btn.at .side-chk{display:flex;background:var(--sgreen);color:#000}

/* Flip button column */
.flip-col{display:flex;flex-direction:column;gap:5px}
.payout-mini{font-size:10.5px;color:var(--text3);font-family:'Rajdhani',sans-serif;font-weight:600;text-align:center}
.payout-mini span{color:var(--sgreen);font-family:'Orbitron',monospace;font-size:11px}
.btn-flip{flex:1;padding:0;
  background:linear-gradient(135deg,var(--spurple) 0%,#5b21b6 40%,var(--sgreen) 100%);
  background-size:200% 200%;animation:gs 5s ease infinite;
  border:none;border-radius:12px;color:#fff;
  font-family:'Orbitron',monospace;font-size:13px;font-weight:700;letter-spacing:.06em;
  cursor:pointer;box-shadow:0 4px 20px rgba(153,69,255,.4);
  position:relative;overflow:hidden;min-height:64px;
  display:flex;align-items:center;justify-content:center}
.btn-flip:disabled{opacity:.4;animation:none;background:#1a2540}
.btn-flip:active{opacity:.85}

/* Phantom open button for mobile */
.btn-phantom-open{width:100%;padding:12px;
  background:linear-gradient(135deg,#9945ff,#6d28d9);border:none;border-radius:10px;
  color:#fff;font-family:'Rajdhani',sans-serif;font-size:13.5px;font-weight:700;
  letter-spacing:.08em;cursor:pointer;box-shadow:0 3px 16px rgba(153,69,255,.45);
  display:flex;align-items:center;justify-content:center;gap:8px}

/* Toast */
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%) translateY(-120%);
  padding:10px 20px;border-radius:24px;font-family:'Rajdhani',sans-serif;font-size:13.5px;
  font-weight:700;z-index:999;transition:transform .3s ease;white-space:nowrap;
  max-width:90vw;text-align:center;box-shadow:0 8px 30px rgba(0,0,0,.5)}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.s{background:rgba(0,245,160,.15);border:1px solid var(--green);color:var(--green)}
.toast.e{background:rgba(255,77,109,.15);border:1px solid var(--red);color:var(--red)}
.toast.i{background:rgba(56,189,248,.15);border:1px solid var(--blue);color:var(--blue)}
.toast.w{background:rgba(245,197,66,.15);border:1px solid var(--gold);color:var(--gold)}
.ptcl{position:fixed;pointer-events:none;z-index:500;font-size:22px;animation:floatUp 1.4s ease-out forwards}
.spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.3);
  border-top-color:#fff;border-radius:50%;animation:spinning .7s linear infinite;vertical-align:middle}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <a class="logo" href="#">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="white" stroke-width="1.8"/><path d="M7.5 14.5h9M7.5 9.5h9M10 12h4" stroke="white" stroke-width="1.8" stroke-linecap="round"/></svg>
    </div>
    <div class="logo-text"><b>SOL</b><span>FLIP</span></div>
  </a>
  <div class="hdr-r">
    <span class="net-pill" id="netPill">MAINNET</span>
    <button class="btn-connect" id="connectBtn" onclick="connectWallet()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4z"/></svg>
      Connect
    </button>
  </div>
</div>

<!-- SCROLL AREA (game + chat tabs) -->
<div class="scroll-area">
  <!-- Tab bar -->
  <div class="tab-bar">
    <button class="tab-btn active" id="tabGame" onclick="switchTab('game')">&#127922; Game</button>
    <button class="tab-btn" id="tabChat" onclick="switchTab('chat')">&#128172; Chat</button>
    <button class="tab-btn" id="tabHistory" onclick="switchTab('history')">&#128202; History</button>
  </div>

  <!-- GAME TAB -->
  <div class="tab-pane active" id="paneGame">
    <div class="hist-bar">
      <span style="width:7px;height:7px;background:var(--red);border-radius:50%;display:inline-block;box-shadow:0 0 5px var(--red)"></span>
      <span style="font-size:9.5px;color:var(--red);font-family:'Rajdhani',sans-serif;font-weight:700;letter-spacing:.1em;margin-right:4px">LIVE</span>
      <div id="histDots" style="display:flex;gap:3px;flex-wrap:wrap;flex:1"></div>
      <div class="hb-stats">
        <span>H:<span id="hc" style="color:var(--gold);margin-left:2px">0</span></span>
        <span>T:<span id="tc" style="color:var(--sgreen);margin-left:2px">0</span></span>
        <span>&#8721;<span id="totc" style="margin-left:2px">0</span></span>
      </div>
    </div>
    <div class="coin-stage" id="coinStage">
      <div class="coin-glow" id="coinGlow"></div>
      <div class="coin-wrapper" id="coinWrapper">
        <div class="coin" id="coin">
          <div class="face face-h"><div class="sol-bars"><div class="sol-bar"></div><div class="sol-bar"></div><div class="sol-bar"></div></div><div class="coin-lbl">SOLANA</div></div>
          <div class="face face-t"><div class="tails-sym">&#9677;</div><div class="tails-lbl">TAILS</div></div>
        </div>
      </div>
      <div class="result-ov" id="resultOv"><div class="result-word" id="resultWord"></div><div class="result-sub" id="resultSub"></div></div>
    </div>
    <div class="m-stats">
      <div class="m-stat"><div class="m-sv" id="svF">0</div><div class="m-sl">Flips</div></div>

<!-- Buffer polyfill for Solana web3.js -->
<script src="https://bundle.run/buffer@6.0.3"></script>
<script>window.Buffer = buffer.Buffer;</script>
<!-- Solana web3.js -->
<script src="https://unpkg.com/@solana/web3.js@1.98.0/lib/index.iife.min.js"></script>
<script src="db.js"></script>
<script>
// STATE
let pubkey = null, balance = 0, side = 'heads';
let flipping = false, myFlips = [], wins = 0, myTotal = 0, myPnl = 0;
const chatUser = randomUsername();
let lastChatTs = 0, lastFlipTs = 0;
let srvSettings = {};
let lastChatId = 0;

// SERVER API HELPER
async function api(path, opts) {
  opts = opts || {};
  opts.headers = { 'Content-Type': 'application/json' };
  const r = await fetch(window.location.origin + path, opts);
  const d = await r.json();
  if (!d.ok) throw new Error(d.error || 'API error');
  return d;
}

// LOAD SETTINGS FROM SERVER
async function loadSrvSettings() {
  try {
    const d = await api('/api/settings');
    srvSettings = d.settings;
    document.getElementById('netPill').textContent = (srvSettings.network || 'mainnet').toUpperCase();
    updPayout();
  } catch(e) {
    srvSettings = DB.getSettings();
    document.getElementById('netPill').textContent = (srvSettings.network || 'mainnet').toUpperCase();
    updPayout();
  }
}

// BALANCE via server proxy (no CORS issue)
async function fetchBal() {
  if (!pubkey) return;
  document.getElementById('balRefBtn').textContent = 'refreshing...';
  try {
    const d = await api('/api/balance?wallet=' + pubkey);
    balance = d.balance;
    updBalUI();
  } catch(e) {
    toast('Balance fetch failed: ' + e.message, 'w');
  }
  document.getElementById('balRefBtn').textContent = 'Refresh';
}
function updBalUI() {
  document.getElementById('balVal').innerHTML = balance.toFixed(4) + ' <span style="font-size:13px;color:var(--text3)">SOL</span>';
  document.getElementById('balUsd').textContent = 'approx $' + (balance * 180).toFixed(2) + ' USD';
}

// PHANTOM WALLET
async function connectWallet() {
  if (pubkey) { disconnWallet(); return; }
  if (location.protocol === 'file:') { showPhantomModal('local'); return; }
  const ph = window.solana;
  if (!ph || !ph.isPhantom) {
    if (window.solana) toast('Non-Phantom wallet detected. Use Phantom.', 'w');
    else showPhantomModal('notinstalled');
    return;
  }
  setConnBtn('<span class="spin"></span> Connecting...');
  try {
    const resp = await ph.connect();
    pubkey = resp.publicKey.toString();
    onConn();
  } catch(e) { resetConnBtn(); toast('Connection rejected', 'e'); }
}
function onConn() {
  const short = pubkey.slice(0,5) + '...' + pubkey.slice(-4);
  document.getElementById('connectBtn').innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> ' + short;
  document.getElementById('connectBtn').classList.add('connected');
  fetchBal();
  toast('Wallet connected! Ready to flip', 's');
  apiChat('Game', pubkey.slice(0,6) + '... joined the game', true);
}
function disconnWallet() {
  if (window.solana) window.solana.disconnect().catch(function(){});
  pubkey = null; balance = 0;
  resetConnBtn();
  document.getElementById('balVal').innerHTML = '0.0000 <span style="font-size:13px;color:var(--text3)">SOL</span>';
  document.getElementById('balUsd').textContent = 'Connect wallet to start';
  toast('Disconnected', 'i');
}
function setConnBtn(html) { document.getElementById('connectBtn').innerHTML = html; }
function resetConnBtn() {
  document.getElementById('connectBtn').innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4z"/></svg> Connect Wallet';
  document.getElementById('connectBtn').classList.remove('connected');
}

// SEND BET TX (player wallet -> treasury)
async function sendBetTx(lamports, treasuryAddr) {
  if (!window.Buffer) throw new Error('Buffer polyfill not loaded');
  if (typeof solanaWeb3 === 'undefined') throw new Error('Solana web3.js not loaded');
  var rpcUrl = srvSettings.rpcUrl || 'https://api.mainnet-beta.solana.com';
  var sw3 = solanaWeb3;
  var conn = new sw3.Connection(rpcUrl, 'confirmed');
  var from = new sw3.PublicKey(pubkey);
  var to   = new sw3.PublicKey(treasuryAddr);
  var latest = await conn.getLatestBlockhash();
  var tx = new sw3.Transaction({ recentBlockhash: latest.blockhash, feePayer: from });
  tx.add(sw3.SystemProgram.transfer({ fromPubkey: from, toPubkey: to, lamports: lamports }));
  var sig;
  try {
    var res = await window.solana.signAndSendTransaction(tx);
    sig = res.signature || res;
  } catch(e1) {
    var signed = await window.solana.signTransaction(tx);
    var raw = signed.serialize();
    sig = await conn.sendRawTransaction(raw, { skipPreflight: false });
  }
  await conn.confirmTransaction({ signature: sig, blockhash: latest.blockhash, lastValidBlockHeight: latest.lastValidBlockHeight }, 'confirmed');
  return sig;
}

// FLIP - full flow: bet tx -> server resolves + auto-pays if won
async function doFlip() {
  if (flipping) return;
  if (!pubkey) { toast('Connect your Phantom wallet first!', 'e'); return; }

  var bet = parseFloat(document.getElementById('betAmt').value);
  var minB = parseFloat(srvSettings.minBet || 0.001);
  var maxB = parseFloat(srvSettings.maxBet || 0.5);
  if (isNaN(bet) || bet < minB) { toast('Min bet: ' + minB + ' SOL', 'e'); return; }
  if (bet > maxB) { toast('Max bet: ' + maxB + ' SOL', 'e'); return; }
  if (bet > balance) { toast('Insufficient balance!', 'e'); return; }
  if (!srvSettings.treasuryAddress) { toast('Treasury not set — contact admin', 'e'); return; }

  var cd = parseFloat(srvSettings.flipCooldown || 5) * 1000;
  if (Date.now() - lastFlipTs < cd && lastFlipTs > 0) {
    toast('Cooldown: wait ' + Math.ceil((cd - (Date.now() - lastFlipTs)) / 1000) + 's', 'w');
    return;
  }

  flipping = true;
  lastFlipTs = Date.now();
  var btn = document.getElementById('flipBtn');
  btn.disabled = true;
  document.getElementById('resultOv').classList.remove('show');

  // Step 1: Player sends bet SOL to treasury
  var txSig;
  try {
    btn.innerHTML = '<span class="spin"></span> CONFIRM IN WALLET...';
    txSig = await sendBetTx(Math.round(bet * 1e9), srvSettings.treasuryAddress);
    btn.innerHTML = '<span class="spin"></span> TX CONFIRMED...';
  } catch(e) {
    toast('TX failed: ' + (e.message || String(e)), 'e');
    btn.disabled = false;
    btn.innerHTML = 'FLIP COIN';
    flipping = false;
    return;
  }

  // Step 2: Tell server the txSig — server resolves outcome + sends payout if won
  var flipResult;
  try {
    btn.innerHTML = '<span class="spin"></span> RESOLVING...';
    flipResult = await api('/api/flip', {
      method: 'POST',
      body: JSON.stringify({ wallet: pubkey, bet: bet, pick: side, txSig: txSig })
    });
  } catch(e) {
    toast('Server error: ' + e.message + ' — contact admin', 'e');
    btn.disabled = false;
    btn.innerHTML = 'FLIP COIN';
    flipping = false;
    await fetchBal();
    return;
  }

  var result    = flipResult.result;
  var won       = flipResult.won;
  var payout    = flipResult.payout;
  var pnl       = flipResult.pnl;
  var payoutSig = flipResult.payoutSig;

  // Step 3: Animate coin
  btn.innerHTML = '<span class="spin"></span> FLIPPING...';
  var coin = document.getElementById('coin');
  coin.style.setProperty('--end-rot', (result === 'heads' ? 1440 : 1620) + 'deg');
  coin.classList.add('flipping');

  setTimeout(async function() {
    coin.classList.remove('flipping');
    if (result === 'tails') coin.classList.add('show-t');
    else coin.classList.remove('show-t');

    // Refresh real on-chain balance
    await fetchBal();

    myTotal++;
    if (won) wins++;
    myPnl = parseFloat((myPnl + pnl).toFixed(6));
    updStats();
    addHistDot(result);
    addHistRow({ bet: bet, pick: side, result: result, won: won, pnl: pnl });
    showResult(won, result, pnl, payout, payoutSig);
    spawnPtcl(won);
    updGlow(won);
    loadStats();

    var chatMsg = pubkey.slice(0,6) + '... ';
    chatMsg += won ? ('WON ' + payout + ' SOL') : ('LOST ' + bet + ' SOL');
    chatMsg += ' — ' + side.toUpperCase() + ' -> ' + result.toUpperCase();
    apiChat('Game', chatMsg, true);

    setTimeout(function() {
      document.getElementById('resultOv').classList.remove('show');
      flipping = false;
      btn.disabled = false;
      btn.innerHTML = 'FLIP COIN';
    }, 3000);
  }, 1800);
}

function showResult(won, result, pnl, payout, payoutSig) {
  document.getElementById('resultWord').textContent = won ? 'YOU WIN!' : 'YOU LOSE';
  document.getElementById('resultWord').className = 'result-word ' + (won ? 'win' : 'lose');
  var sub = (pnl >= 0 ? '+' : '') + pnl.toFixed(4) + ' SOL   ' + result.toUpperCase();
  if (won && payoutSig && payoutSig.indexOf('PAYOUT_FAILED') === -1) {
    sub += '   Paid out';
  } else if (won && payoutSig && payoutSig.indexOf('PAYOUT_FAILED') !== -1) {
    sub += '   Payout pending — contact admin';
    toast('Payout delayed — note your TX: ' + payoutSig.replace('PAYOUT_FAILED: ',''), 'w');
  }
  document.getElementById('resultSub').textContent = sub;
  document.getElementById('resultOv').classList.add('show');
}
function updGlow(won) {
  var g = document.getElementById('coinGlow');
  g.style.background = won
    ? 'radial-gradient(circle,rgba(20,241,149,.2) 0%,transparent 70%)'
    : 'radial-gradient(circle,rgba(255,77,109,.18) 0%,transparent 70%)';
  setTimeout(function() { g.style.background = 'radial-gradient(circle,rgba(153,69,255,.08) 0%,transparent 70%)'; }, 2500);
}
function updStats() {
  document.getElementById('svF').textContent = myTotal;
  document.getElementById('svW').textContent = myTotal ? (wins/myTotal*100).toFixed(0)+'%' : '--';
  var pEl = document.getElementById('svP');
  pEl.textContent = (myPnl >= 0 ? '+' : '') + myPnl.toFixed(3);
  pEl.className = 'sv ' + (myPnl > 0 ? 'g' : myPnl < 0 ? 'r' : '');
}
function addHistDot(r) {
  var c = document.getElementById('histDots');
  var d = document.createElement('div');
  d.className = 'hb-dot ' + (r === 'heads' ? 'H' : 'T');
  d.textContent = r === 'heads' ? 'H' : 'T';
  c.appendChild(d);
  while (c.children.length > 28) c.removeChild(c.firstChild);
}
function addHistRow(f) {
  var tb = document.getElementById('histBody');
  if (tb.querySelector('.no-data')) tb.innerHTML = '';
  var r = document.createElement('tr');
  var pnlStr = (f.pnl >= 0 ? '+' : '') + parseFloat(f.pnl).toFixed(4);
  r.innerHTML = '<td>' + (myFlips.length + 1) + '</td><td>' + f.bet + ' SOL</td><td>' + f.pick.toUpperCase() + ' -> ' + f.result.toUpperCase() + '</td><td class="' + (f.won ? 'ow' : 'ol') + '">' + (f.won ? 'WIN' : 'LOSE') + '</td><td class="' + (f.won ? 'ow' : 'ol') + '">' + pnlStr + '</td>';
  tb.insertBefore(r, tb.firstChild);
  myFlips.push(f);
}
function clearMH() {
  document.getElementById('histBody').innerHTML = '<tr><td colspan="5" class="no-data">-- No flips yet --</td></tr>';
  document.getElementById('histDots').innerHTML = '';
  myFlips = []; wins = 0; myTotal = 0; myPnl = 0; updStats();
}

// BET CONTROLS
function setBet(v) {
  document.getElementById('betAmt').value = v;
  document.querySelectorAll('.qb').forEach(function(b) { b.classList.toggle('active', parseFloat(b.textContent) === v); });
  updPayout();
}
function halfBet() {
  var v = Math.max(parseFloat(srvSettings.minBet || 0.001), parseFloat(document.getElementById('betAmt').value) / 2);
  document.getElementById('betAmt').value = v.toFixed(4); updPayout();
}
function dblBet() {
  var v = Math.min(parseFloat(srvSettings.maxBet || 0.5), parseFloat(document.getElementById('betAmt').value) * 2);
  document.getElementById('betAmt').value = v.toFixed(4); updPayout();
}
function maxBet() { document.getElementById('betAmt').value = srvSettings.maxBet || 0.5; updPayout(); }
function updPayout() {
  var bet  = parseFloat(document.getElementById('betAmt').value) || 0;
  var edge = parseFloat(srvSettings.houseEdge || 4);
  var m    = parseFloat(((1 - edge / 100) * 2).toFixed(4));
  document.getElementById('payoutD').textContent = (bet * m).toFixed(4) + ' SOL';
  document.getElementById('multD').textContent   = m + 'x';
}
function pickSide(s) {
  side = s;
  document.getElementById('btnH').className = 'side-btn' + (s === 'heads' ? ' ah' : '');
  document.getElementById('btnT').className = 'side-btn' + (s === 'tails' ? ' at' : '');
}

// CHAT — server backed, polls every 3s
function renderMsg(m) {
  var c = document.getElementById('chatMsgs');
  var d = document.createElement('div');
  d.className = 'chat-msg' + (m.system ? ' sys' : '') + (m.gameEvent ? ' ge' : '');
  if (!m.system) d.innerHTML = '<div class="msg-name">' + esc(m.name) + '</div>';
  d.innerHTML += '<div class="msg-text">' + esc(m.text) + '</div>';
  c.appendChild(d);
  c.scrollTop = c.scrollHeight;
  while (c.children.length > 80) c.removeChild(c.firstChild);
}
async function apiChat(name, text, gameEvent) {
  try {
    await api('/api/chat', { method: 'POST', body: JSON.stringify({ name: name, text: text, gameEvent: !!gameEvent }) });
  } catch(e) {}
}
async function pollChat() {
  try {
    var d = await api('/api/chat');
    d.messages.forEach(function(m) {
      if (m.id > lastChatId) { renderMsg(m); lastChatId = Math.max(lastChatId, m.id); }
    });
  } catch(e) {}
}
async function sendChat() {
  if (!srvSettings.chatEnabled) { toast('Chat disabled', 'i'); return; }
  var cd = parseFloat(srvSettings.msgCooldown || 3) * 1000;
  if (Date.now() - lastChatTs < cd) {
    toast('Wait ' + Math.ceil((cd - (Date.now() - lastChatTs)) / 1000) + 's', 'w'); return;
  }
  var inp = document.getElementById('chatInp');
  var txt = inp.value.trim();
  if (!txt) return;
  await apiChat(chatUser, txt, false);
  inp.value = '';
  lastChatTs = Date.now();
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// GLOBAL STATS from server
async function loadStats() {
  try {
    var d = await api('/api/stats');
    document.getElementById('hc').textContent   = d.headsCount;
    document.getElementById('tc').textContent   = d.tailsCount;
    document.getElementById('totc').textContent = d.totalFlips;
    if (!document.getElementById('histDots').children.length) {
      d.recentFlips.slice(0, 28).reverse().forEach(function(f) { addHistDot(f.result); });
    }
  } catch(e) {}
}

// 3D COIN TILT
var stage    = document.getElementById('coinStage');
var wrapper  = document.getElementById('coinWrapper');
var crosshair = document.getElementById('crosshair');
stage.addEventListener('mousemove', function(e) {
  if (flipping) return;
  var r  = stage.getBoundingClientRect();
  var tx = -((e.clientY - r.top  - r.height/2) / (r.height/2)) * 18;
  var ty =  ((e.clientX - r.left - r.width/2)  / (r.width/2))  * 18;
  wrapper.style.transform = 'rotateX(' + tx + 'deg) rotateY(' + ty + 'deg)';
  crosshair.style.left    = (e.clientX - r.left) + 'px';
  crosshair.style.top     = (e.clientY - r.top)  + 'px';
  crosshair.style.opacity = '1';
});
stage.addEventListener('mouseleave', function() {
  wrapper.style.transition = 'transform .5s ease';
  wrapper.style.transform  = 'rotateX(0) rotateY(0)';
  crosshair.style.opacity  = '0';
  setTimeout(function() { wrapper.style.transition = 'transform .08s linear'; }, 520);
});

// PARTICLES
function spawnPtcl(won) {
  var em = won ? ['💰','🎉','✨','🌟','💫'] : ['💀','😭','💸'];
  for (var i = 0; i < (won ? 8 : 3); i++) {
    (function(i) {
      setTimeout(function() {
        var el = document.createElement('div');
        el.className = 'ptcl';
        el.textContent = em[Math.floor(Math.random() * em.length)];
        el.style.left = (28 + Math.random() * 44) + 'vw';
        el.style.top  = '60vh';
        document.body.appendChild(el);
        setTimeout(function() { el.remove(); }, 1500);
      }, i * 90);
    })(i);
  }
}

// PHANTOM HELP MODAL
function showPhantomModal(type) {
  var modal = document.getElementById('phantomModal');
  var title = document.getElementById('pmTitle');
  var body  = document.getElementById('pmBody');
  var acts  = document.getElementById('pmActions');
  modal.style.display = 'flex';
  var bs = 'padding:11px;border:none;border-radius:9px;cursor:pointer;font-family:Rajdhani,sans-serif;font-size:14px;font-weight:700;width:100%;transition:all .2s';
  if (type === 'local') {
    title.textContent = 'Local File Detected';
    body.innerHTML = 'Phantom will not connect when opened as a file.<br><br><strong style="color:#e2eaf8">Run the Node.js server instead:</strong><br><br><code style="background:#060a12;border:1px solid #172034;padding:10px 14px;border-radius:8px;display:block;font-size:13px;color:#14f195;text-align:left;margin:8px 0">node server.js</code>Then open: <code style="color:#38bdf8">http://localhost:8080</code>';
    acts.innerHTML = '<button style="' + bs + ';background:linear-gradient(135deg,#9945ff,#14f195);color:#fff" onclick="navigator.clipboard.writeText(\'node server.js\');this.textContent=\'Copied!\';setTimeout(()=>this.textContent=\'Copy Command\',2000)">Copy Command</button>';
  } else {
    title.textContent = 'Phantom Not Found';
    body.innerHTML = 'Phantom wallet extension is not installed in your browser.<br><br>Install it then refresh this page.';
    acts.innerHTML = '<button style="' + bs + ';background:linear-gradient(135deg,#9945ff,#14f195);color:#fff" onclick="window.open(\'https://phantom.app\',\'_blank\')">Install Phantom</button>';
  }
}

// TOAST
var toastT;
function toast(msg, type) {
  type = type || 'i';
  clearTimeout(toastT);
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + type + ' show';
  toastT = setTimeout(function() { el.classList.remove('show'); }, 3500);
}

// INIT
(async function() {
  await loadSrvSettings();
  await loadStats();
  await pollChat();
  setInterval(pollChat, 3000);
  setInterval(loadSrvSettings, 30000); // refresh settings every 30s

  // Welcome message
  var c = document.getElementById('chatMsgs');
  if (!c.children.length) {
    var d = document.createElement('div');
    d.className = 'chat-msg sys';
    d.innerHTML = '<div class="msg-text">Welcome to SolFlip! Connect your Phantom wallet to play.</div>';
    c.appendChild(d);
  }

  // Auto-reconnect Phantom if already approved
  if (window.solana && window.solana.isPhantom) {
    window.solana.connect({ onlyIfTrusted: true })
      .then(function(r) { pubkey = r.publicKey.toString(); onConn(); })
      .catch(function() {});
    window.solana.on('accountChanged', function(pk) {
      if (pk) { pubkey = pk.toString(); onConn(); } else disconnWallet();
    });
    window.solana.on('disconnect', disconnWallet);
  }
})();
</script>
</body>

<script>

  document.getElementById('tab' + name.charAt(0).toUpperCase() + name.slice(1)).classList.add('active');
  document.getElementById('pane' + name.charAt(0).toUpperCase() + name.slice(1)).classList.add('active');
}

var _origUpdStats = updStats;
updStats = function() {
  document.getElementById('svF').textContent = myTotal;
  document.getElementById('svW').textContent = myTotal ? (wins/myTotal*100).toFixed(0)+'%' : '--';
  var pEl = document.getElementById('svP');
  pEl.textContent = (myPnl >= 0 ? '+' : '') + myPnl.toFixed(3);

};

// Override showPhantomModal for mobile — bottom sheet + Phantom deep link

  var modal = document.getElementById('phantomModal');

  var phantomDeepLink = 'https://phantom.app/ul/browse/' + pageUrl + '?ref=' + pageUrl;

  if (type === 'local') {
    title.textContent = 'Run Local Server';

  }
};
